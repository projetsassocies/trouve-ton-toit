<!DOCTYPE html>
<html>
<head><title>Generate TTT Icons</title></head>
<body>
<p>Open this file in Chrome, right-click each image below and "Save image as" to the icons/ folder.</p>
<h3>icon16.png</h3>
<canvas id="c16" width="16" height="16"></canvas>
<h3>icon48.png</h3>
<canvas id="c48" width="48" height="48"></canvas>
<h3>icon128.png</h3>
<canvas id="c128" width="128" height="128"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  // Background circle
  ctx.fillStyle = '#095237';
  ctx.beginPath();
  ctx.arc(s/2, s/2, s/2, 0, Math.PI * 2);
  ctx.fill();
  // House icon
  ctx.strokeStyle = '#fff';
  ctx.fillStyle = '#fff';
  ctx.lineWidth = s * 0.06;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  const m = s * 0.25; // margin
  // Roof
  ctx.beginPath();
  ctx.moveTo(m, s * 0.45);
  ctx.lineTo(s/2, m);
  ctx.lineTo(s - m, s * 0.45);
  ctx.stroke();
  // Walls
  ctx.beginPath();
  ctx.moveTo(m + s*0.05, s * 0.43);
  ctx.lineTo(m + s*0.05, s - m);
  ctx.lineTo(s - m - s*0.05, s - m);
  ctx.lineTo(s - m - s*0.05, s * 0.43);
  ctx.stroke();
  // Door
  ctx.fillRect(s*0.42, s*0.55, s*0.16, s - m - s*0.55);
}
drawIcon(document.getElementById('c16'));
drawIcon(document.getElementById('c48'));
drawIcon(document.getElementById('c128'));

// Convert to downloadable images
['c16','c48','c128'].forEach(id => {
  const canvas = document.getElementById(id);
  const img = new Image();
  img.src = canvas.toDataURL('image/png');
  img.style.display = 'block';
  img.style.margin = '8px 0';
  canvas.parentNode.insertBefore(img, canvas.nextSibling);
});
</script>
</body>
</html>
